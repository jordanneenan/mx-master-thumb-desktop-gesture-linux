// Logiops configuration file for Logitech MX Master mice (MX Master 1 & 3)
// Save this file as /etc/logid.cfg and restart logid:
// sudo systemctl restart logid

devices: (
{
  name: "MX Master 3 for Mac";

  // Enable SmartShift on the main scroll wheel
  smartshift: {
    on: true;
    threshold: 20;
  };

  // High resolution scrolling configurations
  hiresscroll: {
    hires: true;
    invert: false;
    target: false;
  };

  // Default pointer sensitivity (DPI)
  dpi: 1000;

  // Thumbwheel is removed from this configuration, meaning it will revert 
  // to its native behavior (horizontal scrolling left and right in web browsers, 
  // spreadsheets, code editors, etc.) with smooth hardware control.

  // Map other side buttons (Forward/Backward and Gesture/Thumb button)
  buttons: (
    // Forward Button (Upper side button)
    {
      cid: 0x56;
      action = {
        type: "Keypress";
        keys: ["KEY_FORWARD"];
      };
    },
    // Backward Button (Lower side button)
    {
      cid: 0x53;
      action = {
        type: "Keypress";
        keys: ["KEY_BACK"];
      };
    },
    // Gesture/Thumb rest button (Launch Overview / Show all windows)
    {
      cid: 0xc3;
      action = {
        type: "Keypress";
        keys: ["KEY_LEFTMETA"];
      };
    }
  );
},
{
  name: "Wireless Mouse MX Master";

  // Enable SmartShift on the main scroll wheel
  smartshift: {
    on: true;
    threshold: 20;
  };

  // High resolution scrolling configurations
  hiresscroll: {
    hires: true;
    invert: false;
    target: false;
  };

  // Default pointer sensitivity (DPI)
  dpi: 1000;

  // Map other side buttons (Forward/Backward and Gesture/Thumb button)
  buttons: (
    // Forward Button (Upper side button)
    {
      cid: 0x56;
      action = {
        type: "Keypress";
        keys: ["KEY_FORWARD"];
      };
    },
    // Backward Button (Lower side button)
    {
      cid: 0x53;
      action = {
        type: "Keypress";
        keys: ["KEY_BACK"];
      };
    },
    // Gesture/Thumb rest button (Launch Overview / Show all windows)
    {
      cid: 0xc3;
      action = {
        type: "Keypress";
        keys: ["KEY_LEFTMETA"];
      };
    }
  );
}
);
