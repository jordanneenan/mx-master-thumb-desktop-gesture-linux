// Logiops configuration file for Logitech MX Master mice (MX Master 1, 2S, 3, & 3S)
// Save this file as /etc/logid.cfg and restart logid:
// sudo systemctl restart logid

devices: (
{
  name: "MX Master 3 for Mac";
  smartshift: { on: true; threshold: 20; };
  hiresscroll: { hires: true; invert: false; target: false; };
  dpi: 1000;
  buttons: (
    { cid: 0x56; action = { type: "Keypress"; keys: ["KEY_FORWARD"]; }; },
    { cid: 0x53; action = { type: "Keypress"; keys: ["KEY_BACK"]; }; },
    { cid: 0xc3; action = { type: "Keypress"; keys: ["KEY_LEFTMETA"]; }; }
  );
},
{
  name: "Wireless Mouse MX Master";
  smartshift: { on: true; threshold: 20; };
  hiresscroll: { hires: true; invert: false; target: false; };
  dpi: 1000;
  buttons: (
    { cid: 0x56; action = { type: "Keypress"; keys: ["KEY_FORWARD"]; }; },
    { cid: 0x53; action = { type: "Keypress"; keys: ["KEY_BACK"]; }; },
    { cid: 0xc3; action = { type: "Keypress"; keys: ["KEY_LEFTMETA"]; }; }
  );
},
{
